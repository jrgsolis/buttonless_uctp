#
# Local HTTPS profile for UCTP (targetOrigins must be https://...)
#
# Usage:
#  1) Generate a local self-signed keystore (see README)
#  2) Run: mvn spring-boot:run -Dspring-boot.run.profiles=localhttps
#  3) Open: https://localhost:8443/uctp-buttonless
#

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:static/keystore/local-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=changeit
server.ssl.key-alias=local-https

